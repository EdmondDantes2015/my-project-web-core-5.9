<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>

<div class="container">
  <div class="picture">
    <img src="./bg.jpg" class="big" alt="notebook">
    <img src="./logo.svg" class="small" alt="logo">
  </div>

  <div class="content">
    <h1>Get iintoo it today</h1>
    <h2>There is no charge or obligation upon registration</h2>
    <br>
  <form>
    <div class="label">
      <button type="button" class="facebook">
        <img src="facebook.svg" alt="facebook">Register with facebook</button>
      <button type="button" class="linkedin">
        <img src="linkedin.svg" alt="linkedin">Register with Linkedin</button>
    </div>

    <div class="divider">
      <span>or</span>
    </div>
    
    <div class="input">
    <input type="email" placeholder="Email">
    <input type="tel" placeholder="Phone">
    </div>

    <div class="invest">
  <h3>What type of investor are you?</h3>
  <br>
  <h4>Select the type of investor you are below</h4>
    </div>
  

    <div class="circles">
     
       <label class="option">
          <input type="radio" name="options" value="individual">
          Individual
          <span class="info-icon">i</span>
        </label>

        <label class="option">
          <input type="radio" name="options" value="business">
          Business
          <span class="info-icon">i</span>
        </label>

        <label class="option">
          <input type="radio" name="options" value="ira">
          IRA
          <span class="info-icon">i</span>
        </label>

        <label class="option">
          <input type="radio" name="options" value="trust">
          Trust
          <span class="info-icon">i</span>
        </label>
    </div>
  
  <div>
    <textarea class="tx" placeholder="I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common."></textarea>
  </div>

  <div class="agree">
   <input type="checkbox">I agree to the terms and receiving notifications from intoo
<a href="/https:/View.com">View full terms</a>
  </div>
</form>
  <div>
    <button type="button" class="ca">Create Account</button>
    </div>
    </div>
  </div>
</div>
  </body>
</html>
